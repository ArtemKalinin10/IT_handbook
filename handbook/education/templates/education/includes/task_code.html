<div class="task-code-block copyable-code-block">
  <div class="code-header">
    <button type="button" class="copy-btn" onclick="copyCode(this)">
      <span class="copy-btn-text">Скопировать код</span>
      <span class="copy-btn-icon" aria-hidden="true"></span>
    </button>
  </div>

  <pre><code>{{ block.content|escape }}</code></pre>
</div>
