{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Онлайн-школа</title>
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
  <script src="{% static 'main/js/script.js' %}"></script>
</head>
<body>

<header class="header">
  <div class="logo">📘 ЛОГО</div>
  {% if request.user.is_authenticated %}
  <div class="auth">
    <a href="{% url 'profile' %}" class="btn">Личный кабинет</a>
    <a href="{% url 'logout' %}" class="btn danger">
      Выйти
    </a>
  </div>
  {% else %}
    <div class="auth">
      <a href="{% url 'login' %}" class="btn">Вход</a>
      <a href="{% url 'reg' %}" class="btn primary">Регистрация</a>
    </div>    
  {% endif %}
</header>

<main class="container">

  <section class="hero">
    <h1>Онлайн-школа по направлениям</h1>

    <div class="categories">
      {% for course in all_courses %}
        <div class="card">{{ course.title }}</div>
      {% endfor %}
    </div>
  </section>

  <section class="cta">
    <button id="startBtn">Начать обучение</button>
  </section>

</main>
</body>
</html>
